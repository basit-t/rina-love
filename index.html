<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Rina ❤️</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Courier New', monospace;
    text-align: center;
    overflow: hidden;
    transition: background 2s ease;
}

.romantic-bg {
    background: linear-gradient(135deg, #ff4e50, #ff758c, #ff7eb3);
}

h1 {
    margin-top: 80px;
}

#text {
    margin-top: 30px;
    font-size: 22px;
    min-height: 120px;
    padding: 0 30px;
    line-height: 1.6;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    margin: 15px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
}

#yesBtn { background: green; color: white; }
#noBtn { background: red; color: white; position: absolute; }

.glow {
    font-size: 28px;
    color: white;
    text-shadow: 0 0 10px pink, 0 0 20px red, 0 0 30px hotpink;
    animation: glowAnim 1.5s infinite alternate;
}

@keyframes glowAnim {
    from { text-shadow: 0 0 10px pink; }
    to { text-shadow: 0 0 25px red; }
}

.heart, .confetti {
    position: absolute;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Hey Rina ❤️</h1>
<p>(Or should I say… Mrs Basit?)</p>

<button onclick="start()">Click Me</button>

<h2 id="text"></h2>

<div id="choice" style="display:none;">
    <button id="yesBtn" onclick="yesClicked()">YES ❤️</button>
    <button id="noBtn" onmouseover="moveNo()">NO 😜</button>
</div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<script>
let messages = [
    "From the start of February...",
    "when we first talked...",
    "I didn’t know...",
    "that you would become this important to me...",

    "Rina… from the very first moment we started talking, something about you felt different. Slowly, without realizing it, you became part of my thoughts, my days, my happiness. Every small thing reminds me of you, every conversation stays with me. You became my peace, my comfort, and the most beautiful part of my life.",

    "Sometimes I think about how naturally everything changed… how you became someone I can’t imagine my days without. And honestly… I don’t even want to imagine a life where you’re not there.",

    "I don’t just like you...",
    "I feel something real...",
    "something deep...",

    "I LOVE YOU ENDLESSLY </3 ❤️",
    "And I truly mean it...",

    "So tell me honestly..."
];

let i = 0;
let text = document.getElementById("text");

function typeWriter(message, callback) {
    let j = 0;
    text.innerHTML = "";

    let typing = setInterval(() => {
        if (j < message.length) {
            text.innerHTML += message.charAt(j);
            j++;
        } else {
            clearInterval(typing);
            setTimeout(callback, 2000);
        }
    }, 55);
}

function start() {
    document.getElementById("music").play();

    function nextMessage() {
        if (i < messages.length) {
            typeWriter(messages[i], () => {
                i++;
                nextMessage();
            });
        } else {
            text.innerHTML = "Will you be mine forever? 💍❤️";
            document.getElementById("choice").style.display = "block";
        }
    }

    nextMessage();
}

function yesClicked() {
    document.body.classList.add("romantic-bg");

    text.innerHTML = "<span class='glow'>Rina ❤️ You just made me the happiest person alive 💍✨</span>";

    for (let k = 0; k < 150; k++) {
        let el = document.createElement("div");
        el.className = Math.random() > 0.5 ? "heart" : "confetti";
        el.innerHTML = Math.random() > 0.5 ? "❤️" : "✨";

        el.style.left = Math.random() * 100 + "vw";
        el.style.fontSize = (Math.random() * 20 + 10) + "px";

        document.body.appendChild(el);

        setTimeout(() => el.remove(), 5000);
    }
}

function moveNo() {
    let btn = document.getElementById("noBtn");
    btn.style.top = Math.random() * 80 + "vh";
    btn.style.left = Math.random() * 80 + "vw";
}

setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 600);
</script>

</body>
</html>
