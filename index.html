<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Rina ❤️</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:'Courier New',monospace;
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:80px;
}

#text{
    margin-top:30px;
    font-size:22px;
    min-height:100px;
    padding:0 25px;
    line-height:1.6;
}

button{
    padding:12px 25px;
    font-size:18px;
    margin:15px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

#yesBtn{
    background:#16a34a;
    color:white;
}

#noBtn{
    background:#dc2626;
    color:white;
    position:absolute;
}

.heart{
    position:absolute;
    color:red;
    animation:float 5s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<h1>Hey Rina ❤️</h1>
<p>(Or should I say... Mrs Basit)</p>

<button id="startBtn" onclick="start()">Click Me</button>

<h2 id="text"></h2>

<div id="choice" style="display:none;">
    <button id="yesBtn" onclick="yes()">YES ❤️</button>
    <button id="noBtn" onmouseover="moveNo()">NO 😜</button>
</div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<script>
const messages = [
"From the start of February...",
"When we first talked...",
"I didn't know...",
"That you would become this important to me.",

"Rina, from the very first moment we started talking, something felt different. I didn't realize when you slowly became such an important part of my life. Every conversation with you stays in my mind, every moment feels special, and somehow you became my comfort, my happiness, and my peace.",

"I don't just like you...",
"I truly love you ❤️",

"So tell me honestly..."
];

let i = 0;
let text = document.getElementById("text");
let started = false;

function typeWriter(message, callback){
    let index = 0;
    text.innerHTML = "";

    let typing = setInterval(()=>{
        if(index < message.length){
            text.innerHTML += message.charAt(index);
            index++;
        }else{
            clearInterval(typing);
            setTimeout(callback,900);
        }
    },35);
}

function start(){
    if(started) return;
    started = true;

    document.getElementById("startBtn").style.display="none";

    document.getElementById("music").play().catch(()=>{});

    function next(){
        if(i < messages.length){
            typeWriter(messages[i],()=>{
                i++;
                next();
            });
        }else{
            text.innerHTML = "Will you be mine forever? 💍❤️";
            document.getElementById("choice").style.display="block";
            placeNoButton();
        }
    }

    next();
}

function yes(){
    text.innerHTML = "You just made me the happiest person alive ❤️✨";

    for(let k=0;k<150;k++){
        createHeart();
    }
}

function moveNo(){
    placeNoButton();
}

function placeNoButton(){
    const btn = document.getElementById("noBtn");
    btn.style.top = Math.random()*70 + "vh";
    btn.style.left = Math.random()*80 + "vw";
}

function createHeart(){
    let heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+12)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(()=>{
    createHeart();
},500);
</script>

</body>
</html>
