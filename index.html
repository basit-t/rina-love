<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Rina ❤️</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: 'Courier New', monospace;
    text-align: center;
    overflow: hidden;
}

h1 { margin-top: 80px; }

#text {
    margin-top: 30px;
    font-size: 22px;
    min-height: 60px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    margin: 15px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
}

#yesBtn { background: green; color: white; }
#noBtn { background: red; color: white; position: absolute; }

.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Hey Rina ❤️</h1>
<p>(Enay, Jaana, Aloo, Mrs Basit, Meri Jaan)</p>

<button onclick="start()">Click Me</button>

<h2 id="text"></h2>

<div id="choice" style="display:none;">
    <button id="yesBtn" onclick="yes()">YES ❤️</button>
    <button id="noBtn" onmouseover="moveNo()">NO 😜</button>
</div>

<!-- Music -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<script>
let messages = [
    "From the start of February...",
    "when we first talked...",
    "I didn’t know...",
    "that you would become this important to me.",
    "",
    "Rina...",
    "You are my peace...",
    "my happiness...",
    "my favorite notification ❤️",
    "",
    "And today...",
    "I just want to say...",
    "",
    "I LOVE YOU ❤️",
    "",
    "So tell me..."
];

let i = 0;
let text = document.getElementById("text");

function typeWriter(message, callback) {
    let j = 0;
    text.innerHTML = "";
    let typing = setInterval(() => {
        text.innerHTML += message[j];
        j++;
        if (j >= message.length) {
            clearInterval(typing);
            setTimeout(callback, 1000);
        }
    }, 50);
}

function start() {
    document.getElementById("music").play();

    function nextMessage() {
        if (i < messages.length) {
            typeWriter(messages[i], () => {
                i++;
                nextMessage();
            });
        } else {
            text.innerHTML = "Will you be mine forever? 💍❤️";
            document.getElementById("choice").style.display = "block";
        }
    }

    nextMessage();
}

// YES button
function yes() {
    text.innerHTML = "I knew it 😭❤️ You just made me the happiest person alive! 💍✨";

    for (let k = 0; k < 100; k++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }
}

// NO button runs away 😆
function moveNo() {
    let btn = document.getElementById("noBtn");
    btn.style.top = Math.random() * 80 + "vh";
    btn.style.left = Math.random() * 80 + "vw";
}

// floating hearts always
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 400);
</script>

</body>
</html>
